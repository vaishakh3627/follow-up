<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remindly</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="brand">
        <div class="brand-icon">🔔</div>
        <div>
          <h1>Remindly</h1>
          <p>Just tell me what to remind you about.</p>
        </div>
      </header>

      <section class="composer-card" id="authCard">
        <h3 style="margin-top:0;">Account Access</h3>
        <div class="auth-tabs">
          <button type="button" id="showRegisterBtn" class="page-btn auth-tab active-tab">Register</button>
          <button type="button" id="showLoginBtn" class="page-btn auth-tab">Login</button>
        </div>
        <form id="registerForm" class="auth-form">
          <input name="name" type="text" placeholder="Full name" required />
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password (min 6 chars)" required />
          <input name="alertEmail" type="email" placeholder="Alert email (where reminders should come)" required />
          <input name="alertPhone" type="text" placeholder="Alert phone (optional for SMS)" />
          <button type="submit" class="page-btn">Register</button>
        </form>
        <form id="loginForm" class="auth-form hidden" style="margin-top:10px;">
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit" class="page-btn">Login</button>
        </form>
        <p id="authMessage" class="message"></p>
      </section>

      <section class="composer-card hidden" id="userCard">
        <p id="userLine" class="list-meta">Logged in</p>
        <form id="profileForm" class="auth-form">
          <input name="name" type="text" placeholder="Name" required />
          <input name="alertEmail" type="email" placeholder="Alert email" required />
          <input name="alertPhone" type="text" placeholder="Alert phone (optional)" />
          <button type="submit" class="page-btn">Update Profile</button>
          <button type="button" id="logoutBtn" class="page-btn">Logout</button>
        </form>
      </section>

      <section class="composer-card hidden" id="appCard">
        <form id="captureForm" class="composer" enctype="multipart/form-data">
          <button type="button" id="micBtn" class="icon-btn" aria-label="Record voice">🎤</button>
          <input
            id="quickInput"
            name="quickInput"
            type="text"
            placeholder="Remind me to call client tomorrow at 3pm..."
            autocomplete="off"
          />
          <button type="submit" id="sendBtn" class="send-btn" aria-label="Send reminder">➤</button>
          <input id="audioUpload" name="audio" type="file" accept="audio/*" class="hidden" />
        </form>
        <p id="recordStatus" class="record-status">Recorder idle.</p>
        <div class="audio-tools">
          <button type="button" id="pauseBtn" class="page-btn">Pause</button>
          <button type="button" id="stopBtn" class="page-btn">Stop</button>
          <button type="button" id="uploadBtn" class="page-btn">Upload Audio</button>
          <button type="button" id="clearAudioBtn" class="page-btn">Clear Audio</button>
        </div>
        <audio id="recordedPreview" controls class="recorded-preview hidden"></audio>
        <p id="message" class="message"></p>
      </section>

      <section class="list-card hidden" id="listCard">
        <h2>Active reminders</h2>
        <p class="list-meta"><span id="upcomingCount">0</span> active</p>
        <div id="reminderList" class="reminder-list"></div>
        <div class="pagination">
          <button type="button" id="prevPageBtn" class="page-btn">Previous</button>
          <span id="pageInfo">Page 1</span>
          <button type="button" id="nextPageBtn" class="page-btn">Next</button>
        </div>
        <h3 class="subhead">Reminded (last 10)</h3>
        <div id="remindedList" class="reminder-list"></div>
      </section>

      <section class="saved-card hidden" id="savedCard">
        <h3>Saved Reminder Details</h3>
        <div id="lastSaved"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
