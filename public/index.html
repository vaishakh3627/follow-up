<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remindly</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="brand">
        <div class="brand-icon">🔔</div>
        <div>
          <h1>Remindly</h1>
          <p>Just tell me what to remind you about.</p>
        </div>
      </header>

      <section class="composer-card">
        <form id="captureForm" class="composer" enctype="multipart/form-data">
          <button type="button" id="micBtn" class="icon-btn" aria-label="Record voice">🎤</button>
          <input
            id="quickInput"
            name="quickInput"
            type="text"
            placeholder="Remind me to call client tomorrow at 3pm..."
            autocomplete="off"
          />
          <button type="submit" id="sendBtn" class="send-btn" aria-label="Send reminder">➤</button>
          <input id="audioUpload" name="audio" type="file" accept="audio/*" class="hidden" />
        </form>
        <p id="recordStatus" class="record-status">Recorder idle.</p>
        <audio id="recordedPreview" controls class="recorded-preview hidden"></audio>
        <p id="message" class="message"></p>
      </section>

      <section class="list-card">
        <h2>Active reminders</h2>
        <p class="list-meta"><span id="upcomingCount">0</span> active</p>
        <div id="reminderList" class="reminder-list"></div>
        <div class="pagination">
          <button type="button" id="prevPageBtn" class="page-btn">Previous</button>
          <span id="pageInfo">Page 1</span>
          <button type="button" id="nextPageBtn" class="page-btn">Next</button>
        </div>
        <h3 class="subhead">Reminded (last 10)</h3>
        <div id="remindedList" class="reminder-list"></div>
      </section>

      <section class="saved-card hidden" id="savedCard">
        <h3>Saved Reminder Details</h3>
        <div id="lastSaved"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
